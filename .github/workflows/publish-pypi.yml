name: publish-pypi

on:
  workflow_dispatch:
  release:
    types: [published]

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Test and build
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev,serve]" build twine
          python -m pytest -q
          hsf challenge specs/glp1_review.yaml
          python -m build
          python -m twine check dist/*
      - name: Clean wheel smoke
        run: |
          python -m venv /tmp/hsf-wheel
          /tmp/hsf-wheel/bin/python -m pip install dist/*.whl
          /tmp/hsf-wheel/bin/python -m hsf --help
      - name: Attach distributions
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ github.event.release.tag_name }}" dist/* --clobber
      # Temporary encrypted-token fallback. Replace with pure OIDC after
      # PyPI Trusted Publishing is configured for this repository.
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          username: __token__
          password: ${{ secrets.PYPI_TOKEN }}
